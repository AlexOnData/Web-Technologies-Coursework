    <link rel="stylesheet" href="style.css">

<body>
    <header id="cv-header" class="header-small">
        <nav class="cv-nav">
            <ul>
                <li><a href="index.html">Acasă</a></li>
                <li><a href="index.html#education">Educație</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <h2>Galerie - Proiecte și fotografii</h2>
            <p>
                O colecție vizuală cu proiectele la care am lucrat și câteva fotografii
                personale din timpul liber.
            </p>

            <div class="gallery-grid" id="projects-gallery">
                <figure class="gallery-item">
                    <img src="proj1.svg" alt="Captură proiect: aplicație web cu Bootstrap">
                    <figcaption>Web App cu Bootstrap 5</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="proj2.svg" alt="Captură proiect: dashboard cu Firebase">
                    <figcaption>Dashboard cu Firebase</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="proj3.svg" alt="Captură proiect: integrare API extern">
                    <figcaption>Integrare API REST</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="photo1.svg" alt="Fotografie din munți">
                    <figcaption>Drumeție în Bucegi</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="photo2.svg" alt="Fotografie de la o conferință">
                    <figcaption>Conferință tech 2024</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="photo3.svg" alt="Fotografie cu echipa de proiect">
                    <figcaption>Echipa de hackathon</figcaption>
                </figure>
            </div>
        </section>
