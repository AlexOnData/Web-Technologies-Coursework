<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Card Configurator — Solution</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">Product Card Configurator — Solution</span>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">

      <div class="col-12 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Product Configurator</h5>
            <form id="productForm" novalidate>

              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Title</label>
                  <input id="title" class="form-control" required minlength="2">
                  <div class="invalid-feedback">Title is required.</div>
                </div>

                <div class="col-6">
                  <label class="form-label">Price</label>
                  <input id="price" type="number" min="0" step="0.01" class="form-control" required>
                  <div class="invalid-feedback">Price &ge; 0 required.</div>
                </div>

                <div class="col-6">
                  <label class="form-label">Rating</label>
                  <input id="rating" type="number" min="1" max="5" step="0.5" class="form-control" required>
                  <div class="invalid-feedback">Rating between 1 and 5.</div>
                </div>

                <div class="col-12">
                  <label class="form-label">Badge</label>
                  <select id="badge" class="form-select">
                    <option value="">(none)</option>
                    <option>NEW</option>
                    <option>SALE</option>
                    <option>HOT</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label">Image URL</label>
                  <input id="imageUrl" class="form-control" placeholder="https://...">
                </div>

                <div class="col-6">
                  <label class="form-label">Accent color</label>
                  <input id="accent" type="color" value="#0d6efd" class="form-control form-control-color">
                </div>

                <div class="col-6">
                  <label class="form-label">Border radius</label>
                  <input id="radius" type="range" min="0" max="24" value="12" class="form-range">
                </div>

                <div class="col-12">
                  <label class="form-label">Shadow</label>
                  <select id="shadow" class="form-select">
                    <option value="none">None</option>
                    <option value="sm">Small</option>
                    <option value="default" selected>Normal</option>
                    <option value="lg">Large</option>
                  </select>
                </div>

                <div class="col-12 d-flex gap-2 flex-wrap">
                  <button type="button" id="btnPreview" class="btn btn-primary">Preview</button>
                  <button type="submit" class="btn btn-success">Add to Grid</button>
                  <button type="button" id="btnExport" class="btn btn-outline-dark">Export HTML</button>
                </div>
              </div>
            </form>
          </div>
        </div>

        <div id="validationMsg"></div>
      </div>

      <div class="col-12 col-lg-7">

        <div class="card shadow-sm mb-3">
          <div class="card-header">Live Preview</div>
          <div class="card-body" id="previewArea"></div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span>Product Grid</span>
            <button id="btnClear" type="button" class="btn btn-sm btn-outline-danger">Clear</button>
          </div>
          <div class="card-body">
            <div id="grid" class="row g-3"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
