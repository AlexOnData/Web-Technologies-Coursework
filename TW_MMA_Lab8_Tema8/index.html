<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyApp - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">MyApp</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item" id="loginNav"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item" id="profileNav"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item d-none" id="logoutNavItem">
            <button class="btn btn-link nav-link" id="logoutBtn">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="mb-3">Welcome to MyApp</h1>
    <p class="lead">A small demo for client-side authentication using
       <code>localStorage</code>.</p>
    <p>Try logging in with one of these accounts:</p>
    <ul>
      <li><strong>ana</strong> / 1234</li>
      <li><strong>mihai</strong> / abcd</li>
    </ul>
    <p id="userGreeting" class="alert alert-success d-none"></p>
    <a href="login.html" class="btn btn-primary">Go to Login</a>
    <a href="profile.html" class="btn btn-outline-secondary">Go to Profile</a>
  </main>

  <script src="auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = getCurrentUser();
      if (user) {
        const greet = document.getElementById("userGreeting");
        greet.textContent = "You are logged in as " + user.username + ".";
        greet.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
