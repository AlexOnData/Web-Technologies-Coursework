<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">MyApp</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item" id="loginNav"><a class="nav-link active" href="login.html">Login</a></li>
          <li class="nav-item" id="profileNav"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item d-none" id="logoutNavItem">
            <button class="btn btn-link nav-link" id="logoutBtn">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="mb-4">Login</h1>
    <form id="loginForm" class="col-md-4">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" class="form-control" required autocomplete="username" />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" class="form-control" required autocomplete="current-password" />
      </div>
      <div class="text-danger mb-3" id="loginError"></div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
  </main>

  <script src="auth.js"></script>
</body>
</html>
