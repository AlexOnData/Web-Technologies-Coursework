<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">MyApp</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item" id="loginNav"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item" id="profileNav"><a class="nav-link active" href="profile.html">Profile</a></li>
          <li class="nav-item d-none" id="logoutNavItem">
            <button class="btn btn-link nav-link" id="logoutBtn">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1>Profile</h1>
    <p id="welcomeUser" class="lead"></p>
    <p>This is a protected page. If you are seeing this content, you are
       logged in. Refreshing the page or coming back later will keep you
       logged in until you click <em>Logout</em>.</p>
    <a href="index.html" class="btn btn-outline-primary">Back to home</a>
  </main>

  <script src="auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = getCurrentUser();
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("welcomeUser").textContent =
        "Welcome, " + user.username + "!";
    });
  </script>
</body>
</html>
